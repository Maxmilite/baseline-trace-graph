name: Deploy Baseline Trace Graph

on:
  workflow_dispatch:
    inputs:
      seed_query:
        description: "Seed paper (DOI, arXiv ID, or title)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install pipeline
        run: pip install -e pipeline/

      - name: Restore OpenAlex cache
        uses: actions/cache@v4
        with:
          path: data/cache/openalex
          key: openalex-cache-${{ github.run_id }}
          restore-keys: |
            openalex-cache-

      - name: "Pipeline: resolve-seed"
        run: btgraph resolve-seed "${{ inputs.seed_query }}" --mailto "${{ secrets.OPENALEX_MAILTO }}"

      - name: "Pipeline: expand-candidates"
        run: btgraph expand-candidates --mailto "${{ secrets.OPENALEX_MAILTO }}"

      - name: "Pipeline: classify-papers"
        run: btgraph classify-papers

      - name: "Pipeline: fetch-content"
        run: |
          set +e
          btgraph fetch-content --daily-limit 200
          exit_code=$?
          set -e
          if [ $exit_code -eq 2 ]; then
            echo "::warning::fetch-content completed with partial results (exit code 2)"
            exit 0
          fi
          exit $exit_code

      - name: "Pipeline: extract-evidence"
        run: btgraph extract-evidence

      - name: "Pipeline: summarize-edges"
        run: btgraph summarize-edges

      - name: "Pipeline: prune-graph"
        run: btgraph prune-graph

      - name: "Pipeline: export-site"
        run: btgraph export-site

      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Upload pipeline data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-data
          path: data/
          retention-days: 7

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
